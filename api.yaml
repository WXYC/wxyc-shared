        uri:
          type: string
        width:
          type: integer
        height:
          type: integer

    DiscogsRelease:
      type: object
      required:
        - id
        - title
        - artists
        - labels
        - genres
        - styles
        - tracklist
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: integer
        artists:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsArtistRef'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsLabelRef'
        genres:
          type: array
