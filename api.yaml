  # ============================
  # Lookup Service
  # ============================

  /lookup:
    post:
      summary: Look up library items and artwork for a parsed song request
      description: >
        Accepts a parsed song request (artist, song, album) and searches the
        WXYC library catalog, resolves album names via Discogs, fetches artwork,
        and returns matching results with metadata.
      security: []
      tags:
        - lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LookupRequest'
      responses:
        '200':
          description: Lookup results with library matches and artwork
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/v1/identity/resolve:
    post:
      summary: Mint or resolve a stable identity for a release
      description: >
        Resolves a `(kind, source, external_id)` triple to a stable
        `identity_id` on `entity.release_identity`. First call with a new
        triple mints the row and writes one reconciliation log entry;
        subsequent calls return the same `identity_id` with `minted:
        false` and write no log row. Idempotent and concurrency-safe —
        two simultaneous mints with the same input converge on one row
        via the per-source `UNIQUE` constraints on
        `entity.release_identity`.

        Validation runs before any DB write. Sentinel inputs — Discogs
        `external_id <= 0`, malformed or non-album Bandcamp URLs,
        unknown source — are rejected with 422 so no poisoned identity
        rows can land.

        v1 accepts only `kind: release`. The `kind: artist` symmetric
        extension is reserved for a follow-up; for the artist-name
        lookup case, `GET /identity/resolve?name=<artist>` remains the
        right endpoint.
      security:
        - LMLBearerAuth: []
      tags:
        - lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseIdentityResolveRequest'
      responses:
        '200':
          description: Identity resolved (minted or pre-existing).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseIdentityResolveResponse'
        '401':
          description: Missing or invalid `LML_API_KEY` bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: >
            Validation error — sentinel input (e.g. Discogs id <= 0,
            malformed Bandcamp URL) or unknown source / kind.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '503':
          description: >
            Entity store unavailable — either `DATABASE_URL_DISCOGS` is
            unset or the `entity.release_identity` schema has not been
            applied to the discogs-cache PostgreSQL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/v1/identity/bulk-resolve-libraries:
    post:
      summary: Bulk-resolve cross-cache identity for library rows
      description: >
        Per the cross-cache-identity architecture pivot
        (WXYC/Backend-Service#800, 2026-05-09), this is the HTTP-only
        seam between Backend and library-metadata-lookup (LML). LML is
        the sole composer of cross-cache identity. Backend POSTs a batch
        of library rows and receives one composed verdict per input —
        chosen external IDs, the method and confidence that produced it,
        and per-source provenance for audit. LML auto-detects V/A from
        the row and discriminates the response on `kind`. The §3.4.1.1
        composition rules (cross-source agreement boost, MIN-of-confidences,
        sub-floor demotion) execute inside LML's handler; Backend writes
        the response verbatim into `library_identity` and
        `library_identity_source`. `kind: unresolved` is a first-class
        outcome — Backend caches it (with TTL) so the same input is not
        re-asked.
      security:
        - LMLBearerAuth: []
      tags:
        - lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkResolveLibrariesRequest'
      responses:
        '200':
          description: Verdicts for every request input, in input order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResolveLibrariesResponse'
        '400':
          description: Malformed request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Missing or invalid `LML_API_KEY` bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '413':
          description: Batch exceeded the 1,000-input cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Validation error (per-input field validation failed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/v1/artists/search-aliases/bulk:
    post:
      summary: Bulk-fetch artist search aliases from all known sources.
      description: >
        Returns the union of alias variants LML can compose for each input
        artist name — Discogs name variations, aliases, and members from
        discogs-cache; future sources (MusicBrainz aliases, Wikidata labels,
        etc.) appended additively per artist-search-alias plan §Architecture.
        Source-of-truth for resolution is `entity.identity.library_name`
        (seeded from BS's `library.artist_name`), reached via the three-leg
        bulk fall-through (exact → LOWER → canonical). Cache-only on the
        Discogs leg — no Discogs API hits; names whose discogs_artist_id is
        unknown come back as `missing` (BS retries after the monthly cache
        rebuild + entity-resolution campaign warms `entity.identity`). The
        `sources_present` field on each result names the legs the composer
        actually ran for that artist; consumers scope their reconcile
        DELETE to that list so a leg that didn't run does not wipe its
        cached rows. Mirrors `bulk-resolve-libraries` for auth + 413
        semantics.
      operationId: artistSearchAliasesBulk
      security:
        - LMLBearerAuth: []
      tags:
        - lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistSearchAliasesBulkRequest'
      responses:
        '200':
          description: Per-input variants, plus names LML doesn't know.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistSearchAliasesBulkResponse'
        '400':
          description: Malformed request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Missing or invalid `LML_API_KEY` bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '413':
          description: Batch exceeded the 1,000-name cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Validation error (per-input field validation failed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/v1/cache/refresh-for-identities:
    post:
      summary: Warm LML's cache for a batch of release identity_ids
      description: >
        Source-agnostic cache warmer (LML#525). For each `identity_id` in
        the request, resolves the per-source external IDs via
        `entity.release_identity` and fans out the per-source release-cache
        refresh. For each refreshed Discogs release, walks
        `release.artists[*].artist_id` (skipping `artist_id <= 0` — the LML#525
        sentinel guard) and refreshes the per-artist cache.

        Multiplexes onto LML's fallthrough seam (LML#503's `fetched_at`
        discriminator) — won't re-hit Discogs if the cache is already warm.
        "Refresh" means "ensure freshness," not "bypass cache." A future
        `force: true` flag could carry true-bypass semantics post-Discogs-
        reshuffle invalidation.

        Today only the Discogs release leg is wired. `discogs_master`,
        `musicbrainz_release`, `spotify_album`, `apple_music_album`, and
        `bandcamp` return `release_outcome = not_implemented`. See LML#525's
        out-of-scope list for the unblocking dependencies on each.
      security:
        - LMLBearerAuth: []
      tags:
        - cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCacheRefreshRequest'
      responses:
        '200':
          description: Per-identity verdicts in input order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCacheRefreshResponse'
        '400':
          description: Malformed body or batch above the 50-id cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Missing or invalid `LML_API_KEY` bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Empty `identity_ids` (Pydantic min_length=1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '499':
          description: Client closed connection before the batch finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '503':
          description: Entity store or Discogs service not available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

