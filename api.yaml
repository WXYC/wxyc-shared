        wikipedia_url:
          type: string
        discogs_url:
          type: string
        discogs_id:
          type: integer
        image_url:
          type: string
        last_fetched:
          type: string
          format: date-time

    MetadataFetchRequest:
      type: object
      properties:
        album_id:
          type: integer
        artist_id:
          type: integer
        force_refresh:
          type: boolean

    MetadataFetchResponse:
      type: object
      required:
        - source
        - cached
      properties:
        album:
          $ref: '#/components/schemas/AlbumMetadata'
        artist:
          $ref: '#/components/schemas/ArtistMetadata'
        source:
          $ref: '#/components/schemas/MetadataSource'
        cached:
          type: boolean

    DiscogsSearchResult:
      type: object
      required:
        - id
        - title
        - resource_url
        - type
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: integer
        thumb:
          type: string
        cover_image:
          type: string
        resource_url:
          type: string
        type:
          type: string
          enum:
            - release
            - master
            - artist

    DiscogsArtistRef:
      type: object
      required:
        - name
        - id
      properties:
        name:
          type: string
        id:
          type: integer

    DiscogsLabelRef:
      type: object
