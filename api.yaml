            $ref: '#/components/schemas/DiscogsImage'

    # ============================
    # Shared Streaming Types
    # ============================

    StreamingLinks:
      type: object
      description: >
        Streaming service URLs for a release. Used across multiple schemas
        (DiscogsMatchResult, AlbumMetadata, etc.) to canonicalize the set of
        streaming fields.
      properties:
        spotify_url:
          type: string
          nullable: true
          description: Spotify album URL
        apple_music_url:
          type: string
          nullable: true
          description: Apple Music album URL
        youtube_music_url:
          type: string
          nullable: true
          description: YouTube Music search URL
        bandcamp_url:
          type: string
          nullable: true
          description: Bandcamp album URL
        soundcloud_url:
          type: string
          nullable: true
          description: SoundCloud search URL

    ReconciledIdentity:
      type: object
      description: >
        External identifiers for a real-world artist, suitable for joining
        records across services. All fields are bare platform IDs; URL
        construction is the consumer's responsibility (templates are stable
        for Spotify, Apple Music, and Bandcamp; YouTube Music and SoundCloud
        do not have stable per-ID URLs and are intentionally absent — those
        belong on `StreamingLinks`, which serves the playback/result layer).
      properties:
        discogs_artist_id:
          type: integer
          nullable: true
          description: Discogs artist ID
        musicbrainz_artist_id:
          type: string
          nullable: true
          description: MusicBrainz artist UUID
        wikidata_qid:
          type: string
          nullable: true
          description: Wikidata QID (e.g. "Q12345")
        spotify_artist_id:
          type: string
          nullable: true
          description: Spotify artist ID (the Spotify URI suffix)
        apple_music_artist_id:
          type: string
          nullable: true
          description: Apple Music artist ID
        bandcamp_id:
          type: string
          nullable: true
          description: Bandcamp slug (the subdomain in `<slug>.bandcamp.com`)

    # ============================
    # Lookup Service Types
    # ============================

    LookupRequest:
      type: object
      properties:
        artist:
          type: string
          description: Parsed artist name
        song:
          type: string
          description: Parsed song/track title
        album:
          type: string
          description: Parsed album name
        raw_message:
          type: string
          description: >
            Original request message (used for ambiguous format detection).
            Optional when structured fields (artist, album, song) are provided.
        include_identity:
          type: boolean
          default: false
          description: >
            Per cross-cache-identity plan §3.2.2 (E2-LML write contract). When
            true, the response carries an additional `identity` block (the
            §3.2.5 cascade's per-source resolution detail), and `api_version`
            is set to 2. When false (the default), the response is
            byte-identical to v0.5.0 — `identity` is absent and `api_version`
            is omitted. Backend's `library-identity-writer.ts` (E2-BS) sets
            this to true on every call; other consumers (catalog search,
            dj-site proxy, iOS apps) leave it false.
        extended:
          type: boolean
          description: >
            When true, the top-1 result's `artwork` block is populated with
            additional fields LML already fetches during enrichment but
            normally discards: `discogs_artist_id`, `tracklist`, `genres`,
            `styles`, `label`, `full_release_date`, `artist_image_url`, and
            `profile_tokens` (cache-only deep parse of the artist's profile
            markup). Lets a caller obtain a full playcut metadata payload in
            a single `/lookup` call instead of following up with separate
            `/discogs/release/{id}` and `/discogs/artist/{id}` requests.
            Absent or false leaves the response shape unchanged.
        warm_cache:
          type: boolean
          description: >
            When true, LML schedules a fire-and-forget background task after
            the response is built that runs a *deep* async parse of the
            top-1 artist's bio. The task resolves all `[a…]`/`[r…]`/`[m…]`
            references against the Discogs API where the local cache misses,
            warming the PG cache so subsequent reads of the same artist
            render richer bio tokens. Intended for write-path callers (e.g.
            Backend-Service's flowsheet-linkage service committing a new DJ
            entry); read-path callers should leave this absent/false to
            avoid doubling the Discogs-API load per request.

    LibraryCatalogItem:
      type: object
      description: >
        A single item from the WXYC library catalog. Mirrors request-parser's
        LibraryItem with computed properties serialized as regular fields.

        Library identity is the `id` field alone — there is deliberately no
        `album_id`. An `id` of `0` is the "no catalog row" marker: the release
        is not shelved in the WXYC library, but the result may still carry a
        real Discogs identity in its `LookupResultItem.artwork`. See
        `LookupResultItem` for that row-less shape and its discriminator.
      required:
        - id
        - call_number
        - library_url
      properties:
        id:
          type: integer
          description: >
            Unique identifier in the library database. `0` means there is no
            WXYC catalog row for this result (a row-less / "(external)" item,
            e.g. a Discogs-only library miss); any positive value is a real
            shelved release.
        title:
          type: string
          description: Album/release title
        artist:
          type: string
          description: Artist name
        call_letters:
          type: string
          description: Library call letter code
        artist_call_number:
          type: integer
          description: Numeric part of artist classification
        release_call_number:
          type: integer
          description: Numeric part of release classification
        genre:
          type: string
          description: Genre classification
        format:
          type: string
          description: Physical format (vinyl, CD, etc.)
        label:
          type: string
          nullable: true
          description: Record label name from the library catalog
        call_number:
          type: string
          description: >
            Full call number for shelf lookup, e.g. "Rock CD ABC 123/45".
            Computed from genre, format, call_letters, artist_call_number,
            and release_call_number.
        library_url:
          type: string
          description: URL to view this release in the WXYC library
        on_streaming:
          type: boolean
          description: True if this release is available on at least one streaming service. False means only available in the WXYC physical library. Null if unknown.

    DiscogsMatchResult:
      type: object
      description: >
        A processed Discogs search result with artwork and enriched metadata.
        Distinct from the raw DiscogsSearchResult which mirrors the Discogs
        API response directly. Streaming URL fields match the StreamingLinks
        schema and will be migrated to use $ref in a future version.

        Two distinct states share this shape, told apart by `release_id`:
        a real Discogs identity has `release_id > 0` with a non-empty
        `release_url`; the streaming-only sentinel (BS#1185) has
        `release_id == 0` and `release_url == ""`, signalling "I carry only
        streaming URLs, there is no Discogs release to link or to fetch album
        metadata from." A consumer keying "has Discogs identity" on
        `release_id != 0` therefore handles both states correctly, including
        the row-less identity described on `LookupResultItem`.
      required:
        - release_id
        - release_url
      properties:
        album:
          type: string
          description: Release title
        artist:
          type: string
          description: Release artist
        release_id:
          type: integer
          description: >
            Discogs release ID. `> 0` is a real release identity; `0` is the
            streaming-only sentinel (paired with `release_url == ""`, BS#1185)
            and is not a linkable Discogs release.
        master_id:
          type: integer
          nullable: true
          description: >
            Discogs master ID for the release, when the release belongs to a
            master. `null` when Discogs has no master for this release
            (one-offs, self-released) or for the streaming-only sentinel
            (`release_id == 0`). Lets a caller collapse multiple
            pressings/formats of one logical album into a single record keyed
            on the master. Populated from the resolved release's
            `master_id` field on `/lookup` (single and bulk).
        release_url:
          type: string
          description: >
            URL to the release on Discogs. Non-empty for a real release
            identity; the empty string accompanies the `release_id == 0`
            streaming-only sentinel.
        artwork_url:
          type: string
          description: Artwork image URL
        confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0
          description: Match confidence score
        release_year:
          type: integer
          nullable: true
          description: Release year from Discogs
        artist_bio:
          type: string
          nullable: true
          description: Artist biography from Discogs profile
        wikipedia_url:
          type: string
          nullable: true
          description: Wikipedia URL for the artist
        spotify_url:
          type: string
          nullable: true
          description: Spotify album URL
        apple_music_url:
          type: string
          nullable: true
          description: Apple Music album URL
        youtube_music_url:
          type: string
          nullable: true
          description: YouTube Music search URL
        bandcamp_url:
          type: string
          nullable: true
          description: Bandcamp album URL
        soundcloud_url:
          type: string
          nullable: true
          description: SoundCloud search URL
        discogs_artist_id:
          type: integer
          nullable: true
          description: >
            Discogs artist ID for this release. Populated only when the
            originating `LookupRequest.extended` is true. Lets a caller key
            an artist-metadata cache without a follow-up release fetch.
        tracklist:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DiscogsTrackItem'
          description: >
            Release tracklist with per-track artist credits where available.
            Populated only when `extended` is true.
        genres:
          type: array
          nullable: true
          items:
            type: string
          description: >
            Discogs genre tags (e.g. "Rock", "Electronic"). Populated only
            when `extended` is true.
        styles:
          type: array
          nullable: true
          items:
            type: string
          description: >
            Discogs style tags (finer-grained than genres; e.g. "Indie Rock",
            "Ambient"). Populated only when `extended` is true.
        label:
          type: string
          nullable: true
          description: >
            Primary record-label name from the Discogs release. Distinct
            from `LibraryCatalogItem.label` (which comes from the WXYC
            catalog's rotation-release join). Populated only when `extended`
            is true.
        full_release_date:
          type: string
          nullable: true
          description: >
            Release date as an ISO string (e.g. "1997-09-22"). May be
            year-only ("1997") or year-month ("1997-09") if Discogs lacks
            the full date. Populated only when `extended` is true.
        artist_image_url:
          type: string
          nullable: true
          description: >
            Primary artist image URL from Discogs (the artist's profile
            photo, not the release artwork). Populated only when `extended`
            is true.
        profile_tokens:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DiscogsResolvedToken'
          description: >
            Pre-parsed structured tokens from the artist's `profile` markup,
            using a cache-only resolver — references to entities not in the
            local PG cache fall through as plain-text tokens (no inline
            Discogs API calls on the read path). Populated only when
            `extended` is true. Field name matches `DiscogsArtistDetails.profile_tokens`
            so callers can share rendering code across the two payloads.
            Pair with `LookupRequest.warm_cache=true` on write-path calls
            to progressively populate the cache so subsequent reads render
            richer.

    LookupResultItem:
      type: object
      description: >
        A single lookup result pairing a library item with optional artwork and
        reconciled identity.

        `artwork` is optional and independent of `library_item`. This makes the
        *row-less* shape valid and first-class: `library_item.id == 0` (no WXYC
        catalog row) paired with a present `artwork` carrying `release_id > 0`
        and a non-empty `release_url` is a "Discogs identity, no catalog row"
        result — the album isn't shelved in the library, but Discogs confidently
        identifies the release, so the link, artwork, and downstream streaming
        buttons still render. LML emits this shape both from a library-miss
        Discogs search and from a non-library track carry-through (a
        confidently-resolved release for a track whose album isn't shelved).

        This is distinct from the `artwork.release_id == 0` / `release_url == ""`
        streaming-only sentinel (BS#1185), which carries streaming URLs but no
        linkable Discogs release. The discriminator is
        `artwork.release_id > 0 && library_item.id == 0`: unambiguous against the
        sentinel and backward-compatible with any consumer keying "has Discogs
        identity" on `release_id != 0`.
      required:
        - library_item
      properties:
        library_item:
          $ref: '#/components/schemas/LibraryCatalogItem'
        artwork:
          $ref: '#/components/schemas/DiscogsMatchResult'
        reconciled_identity:
          $ref: '#/components/schemas/ReconciledIdentity'
        matched_via:
          type: array
          items:
            $ref: '#/components/schemas/TrackMatchHint'
          description: >
            Populated when a track-title match (LML's new SONG_AS_TRACK strategy)
            drove this release into the results, per catalog-track-search plan §5.1.
            Empty or absent when the release matched via artist/album strategies.
            Backward-compatible — existing consumers ignore the field.
        matched_via_alias:
          type: array
          items:
            $ref: '#/components/schemas/ArtistMatchHint'
          description: >
            Sibling to `matched_via`. Reserved for the day LML composes
            artist-alias hits itself; not produced in v1 of the
            artist-search-alias plan (BS-local cache only). Optional and
            backward-compatible.

    CacheStats:
      type: object
      description: >
        Cache hit/miss statistics for a single lookup operation. Populated by
        LML's `core/telemetry.py:get_cache_stats()` and forwarded onto Sentry
        trace data by both the LML transaction (LML#213) and the BS-side
        client span wrapping `lookupMetadata` (BS#646).
      required:
        - memory_hits
        - pg_hits
        - pg_misses
        - api_calls
        - pg_time_ms
        - api_time_ms
      properties:
        memory_hits:
          type: integer
          minimum: 0
          description: Hits in LML's per-process in-memory TTL cache
        pg_hits:
          type: integer
          minimum: 0
          description: Hits in the discogs-cache PostgreSQL cache
        pg_misses:
          type: integer
          minimum: 0
          description: Misses in the discogs-cache PostgreSQL cache (forced an API call or fallback)
        api_calls:
          type: integer
          minimum: 0
          description: Number of Discogs API calls made during the lookup
        pg_time_ms:
          type: number
          minimum: 0
          description: Total milliseconds spent in PostgreSQL cache lookups
        api_time_ms:
          type: number
          minimum: 0
          description: Total milliseconds spent in Discogs API calls

    LookupResponse:
      type: object
      description: >
        Response from the lookup service containing library search results
        and metadata. When the request set `include_identity: true`, the
        response additionally carries `api_version: 2` and the `identity`
        block (per cross-cache-identity plan §3.2.2). When false or absent,
        the response is byte-identical to v0.5.0 — both `api_version` and
        `identity` are omitted.
      properties:
        api_version:
          type: integer
          enum:
            - 2
          description: >
            Present and equal to 2 only when the request set
            `include_identity: true`. Absent for the v1-compatible shape so
            existing consumers see byte-identical responses.
        results:
          type: array
          items:
            $ref: '#/components/schemas/LookupResultItem'
          default: []
        search_type:
          type: string
          description: >
            The search strategy that produced results: direct, fallback,
            alternative, compilation, song_as_artist, or none
          default: none
          enum:
            - direct
            - fallback
            - alternative
            - compilation
            - song_as_artist
            - none
        song_not_found:
          type: boolean
          default: false
          description: True if search fell back to artist-only (track not confirmed on results)
        found_on_compilation:
          type: boolean
          default: false
          description: True if the track was found on a compilation album
        context_message:
          type: string
          description: Human-readable context string for display
        corrected_artist:
          type: string
          description: Fuzzy-corrected artist name if different from the original
        cache_stats:
          $ref: '#/components/schemas/CacheStats'
        identity:
          $ref: '#/components/schemas/LookupIdentityBlock'
        timeout:
          type: boolean
          default: false
          description: >
            True when LML's server-side hard cap fired and the search pipeline
            was abandoned mid-execution (LML#370). `results` may be partial or
            empty in that case. Callers can use this to distinguish "no match"
            (empty `results`, `timeout: false`) from "ran out of time"
            (`results` may be empty, `timeout: true`). The hard cap is an
            internal LML safety floor independent of the caller's
            `X-Caller-Budget-Ms` header; see LML#338 / LML#340 / LML#370 for
            the cascade-budget design.

    # ====================================
    # Identity Block (§3.2.2 / §3.2.5 cascade)
    # ====================================
    #
    # Returned only when LookupRequest.include_identity is true. Carries the
    # per-source resolution detail from the §3.2.5 cascade so Backend's
    # `library-identity-writer.ts` (E2-BS) can populate
    # `library_identity_source` per-row without a second round-trip.

    IdentitySource:
      type: string
      description: >
        The metadata source whose external ID is being recorded. The set of
        sources matches the columns on `library_identity_source` per plan
        §3.2.0. Add new sources by appending to this enum and to the
        `library_identity_source` schema in lockstep.
      enum:
        - discogs
        - musicbrainz
        - wikidata
        - spotify
        - apple_music
        - bandcamp

    IdentityMethod:
      type: string
      description: >
        The matcher method that produced this resolution, drawn from plan
        §3.4.1's locked confidence-method enum. The order in this list also
        reflects descending confidence ceilings (manual = 1.00,
        cross_source_agreement up to 1.00, exact_match = 1.00,
        name_variation 0.90-0.99, member_group 0.80-0.89, alias_match
        0.75-0.84, trigram 0.70+, llm 0.60-0.79). Backend's writer rejects
        rows where confidence falls outside the method's locked range
        (§3.2.2 sanity check).
      enum:
        - manual
        - cross_source_agreement
        - exact_match
        - name_variation
        - member_group
        - alias_match
        - trigram
        - llm

    IdentitySkipReason:
      type: string
      description: >
        Why a source's leg of the cascade did not run. Set on
        `IdentityResolution.reason` when `attempted: false`. Order is
        irrelevant; values are mutually exclusive per leg.
      enum:
        - error
        - manual_override_protected
        - disabled
        - prerequisite_failed

    IdentityResolution:
      type: object
      description: >
        One source's leg of the §3.2.5 cascade for a single library row.
        Either resolved (`attempted: true` and `external_id` populated when
        a match was found, NULL when the source ran but found no match) or
        skipped (`attempted: false` with `reason` populated and the rest
        nullable). The full `LookupIdentityBlock.resolved` array is
        complete (one entry per known source), not sparse — consumers can
        tell apart "leg ran, no match" from "leg didn't run" without
        guessing.
      required:
        - source
        - attempted
      properties:
        source:
          $ref: '#/components/schemas/IdentitySource'
        attempted:
          type: boolean
          description: >
            True when this source's leg actually ran (whether or not it
            found a match). False when it was skipped — `reason` is
            populated, `external_id`/`method`/`confidence` are NULL.
        external_id:
          type: string
          nullable: true
          description: >
            The external identifier this leg resolved to (Discogs release
            ID, MusicBrainz MBID, Wikidata QID, Spotify URI suffix, Apple
            Music ID, Bandcamp slug). Stored as a string regardless of the
            source's native type so the API surface is uniform; Backend
            casts to the per-source column type when writing
            `library_identity_source`. NULL when `attempted: false`, or
            when the leg ran but found no match.
        method:
          allOf:
            - $ref: '#/components/schemas/IdentityMethod'
          nullable: true
          description: >
            The matcher method that produced the resolution. NULL when
            `attempted: false` or when the leg ran but found no match.
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
          description: >
            Confidence in [0, 1]. Must fall within the method's locked
            range from plan §3.4.1 — Backend's writer rejects rows where
            confidence is out of range. NULL when `attempted: false` or
            when the leg ran but found no match.
        reason:
          allOf:
            - $ref: '#/components/schemas/IdentitySkipReason'
          nullable: true
          description: >
            Required when `attempted: false`; absent or NULL otherwise.

    LookupIdentityBlock:
      type: object
      description: >
        Per-source identity resolution detail for a single library row.
        Returned on `LookupResponse.identity` when the request set
        `include_identity: true`. Per §3.2.2, the `resolved` array is
        complete (one entry per source LML knows about, including the
        sources whose legs didn't run with `attempted: false`) — consumers
        get a deterministic shape regardless of which legs were available.
      required:
        - resolved
      properties:
        resolved:
          type: array
          description: >
            One entry per known source. Order is stable (matches the
            `IdentitySource` enum order). Always populated even when no
            source resolved — the array carries `attempted: false` entries
            in that case.
          items:
            $ref: '#/components/schemas/IdentityResolution'

    # ====================================================================
    # Bulk-Resolve-Libraries (cross-cache-identity pivot)
    # ====================================================================
    #
    # The HTTP-only seam between Backend and LML after the 2026-05-09
    # architecture pivot (WXYC/Backend-Service#800): Backend stops
    # composing cross-cache identity from multiple PG schemas; LML becomes
    # the sole composer. Backend POSTs a batch of library rows and receives
    # a verdict per input — composed external IDs, the chosen method,
    # confidence, and per-source provenance.
    #
    # Request shape is uniform: `{library_id, artist_name, album_title}`.
    # LML auto-detects V/A from the row (per `library.code_volume_letters
    # LIKE 'Z%'` or `EXISTS compilation_track_artist`) and discriminates
    # the response on `kind`:
    #
    #     - `kind: "single_artist"` — resolved single-artist library row;
    #                                  `main` carries the composed identity.
    #     - `kind: "compilation"`   — V/A row; `tracks` carries per-track
    #                                  identity (empty array if LML has no
    #                                  track data for it yet). `main` is
    #                                  null (no album-level artist anchor).
    #     - `kind: "unresolved"`    — LML attempted resolution and found
    #                                  nothing actionable; first-class
    #                                  outcome so Backend can cache and
    #                                  not re-ask. `main` and `tracks`
    #                                  are both null. Audit detail lives
    #                                  in `provenance` (empty means LML
    #                                  tried and nothing resolved).

    BulkResolveLibrariesRequest:
      type: object
      description: >
        Bulk identity-resolution request. Order is preserved in the
        response. Up to 1,000 inputs per call (see endpoint cap).
      required:
        - inputs
      properties:
        inputs:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/BulkResolveInput'
          description: >
            Inputs to resolve. Order preserved in `BulkResolveLibrariesResponse.results`.
      example:
        inputs:
          - library_id: 1234
            artist_name: "Juana Molina"
            album_title: "DOGA"
          - library_id: 5678
            artist_name: "Various Artists"
            album_title: "Edits"

    BulkResolveInput:
      type: object
      description: >
        One library row to resolve. Uniform shape — LML auto-detects V/A
        from the row and discriminates the response on `kind`. The
        denormalized hint fields (`artist_name`, `album_title`) are not
        required to be canonical; LML may use them as matcher hints or
        ignore them in favour of its own mirror of Backend's library data.
        They are present so LML doesn't need a Backend DB read to resolve.
      required:
        - library_id
        - artist_name
        - album_title
      properties:
        library_id:
          type: integer
          description: Backend `wxyc_schema.library.id` (FK target).
        artist_name:
          type: string
          description: Hint — Backend's denormalized artist name for the row.
        album_title:
          type: string
          description: Hint — Backend's denormalized album title for the row.

    BulkResolveResultKind:
      type: string
      description: >
        Discriminator for `BulkResolveResult`. `single_artist` carries a
        composed `main` identity. `compilation` carries `tracks` (empty
        array if LML has no per-track data for the V/A row yet).
        `unresolved` is a first-class outcome — caching it (with TTL)
        prevents repeated re-asking for unresolvable rows.
      enum:
        - single_artist
        - compilation
        - unresolved

    BulkResolveProvenanceEntry:
      type: object
      description: >
        One per-source row in LML's reconciliation log for a single
        result. Surfaces the (source, method, confidence, external_id)
        tuple that fed §3.4.1.1 composition. Always returned (empty
        provenance array on `BulkResolveResult` means LML attempted the
        cascade and no source produced a row).
      required:
        - source
        - method
        - confidence
      properties:
        source:
          $ref: '#/components/schemas/IdentitySource'
        method:
          $ref: '#/components/schemas/IdentityMethod'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
          description: >
            Per-source confidence in [0, 1], within the source's locked
            method range from §3.4.1. NULL when `external_id` is NULL —
            the source ran but produced no candidate, so confidence is
            undefined (not zero). When non-null, equal to or greater than
            the top-level `confidence` (composition rules either MIN or
            boost, never lower a per-source row).
        external_id:
          type: string
          nullable: true
          description: >
            The external identifier this source resolved to (Discogs
            release ID, MusicBrainz MBID, Wikidata QID, Spotify URI
            suffix, etc.). NULL when the source ran but found no match
            (the row is still surfaced so consumers see the leg ran);
            `confidence` is also NULL in that case.

    BulkResolveTrackIdentity:
      type: object
      description: >
        Per-track resolution for a V/A library row. One entry per
        (library_id, track_position) the request resolved. Sources
        reflect the per-source rows LML composed the track identity
        from; the chosen identifiers are not lifted into a per-track
        `external_ids` block at this contract version — Backend writes
        the per-source rows verbatim into `library_track_identity_source`
        per WXYC/library-metadata-lookup#271's design.
      required:
        - track_position
        - sources
      properties:
        track_position:
          type: string
          description: Track position; matches the request input.
        sources:
          type: array
          description: >
            One per-source row per source LML composed the track from.
            Empty array means LML attempted resolution at track grain
            and found no matches.
          items:
            $ref: '#/components/schemas/BulkResolveProvenanceEntry'

    BulkResolveResult:
      type: object
      description: >
        One verdict per request input, in the same order as the request.
        `kind` discriminates the body shape. `library_id` echoes the
        request input so consumers can re-key the response without
        relying on positional ordering.
      required:
        - kind
        - library_id
        - provenance
      properties:
        kind:
          $ref: '#/components/schemas/BulkResolveResultKind'
        library_id:
          type: integer
          description: Backend `library.id` for this result.
        main:
          allOf:
            - $ref: '#/components/schemas/ReconciledIdentity'
          nullable: true
          description: >
            Composed external IDs for `kind: single_artist`. NULL for
            every other `kind`. URL construction is the consumer's job
            (see existing ReconciledIdentity contract).
        method:
          allOf:
            - $ref: '#/components/schemas/IdentityMethod'
          nullable: true
          description: >
            The composed top-level method LML's bulk-resolve handler
            picked per §3.4.1.1 (typically the strongest leg's method,
            or `cross_source_agreement` when Rule 2 boosted). NULL for
            `kind: unresolved`.
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
          description: >
            Composed top-level confidence in [0, 1] — the MIN of resolved
            sources' confidences after composition (§3.4.1.1 Rule 4),
            unless boosted by cross-source agreement (Rule 2). NULL for
            `kind: unresolved`.
        provenance:
          type: array
          description: >
            Per-source rows feeding LML's composition. Always present;
            empty array means LML attempted the cascade and no source
            produced a row above the §3.4.1.1 Rule 6 floor.
          items:
            $ref: '#/components/schemas/BulkResolveProvenanceEntry'
        tracks:
          type: array
          description: >
            Set only for `kind: compilation`; absent for every other `kind`.
            Empty array when LML has no per-track data for the V/A row yet.
            Two states (present-array or absent), not three.
          items:
            $ref: '#/components/schemas/BulkResolveTrackIdentity'

    BulkResolveLibrariesResponse:
      type: object
      description: >
        Response to `POST /api/v1/identity/bulk-resolve-libraries`. Order
        of `results` matches the order of the request's `inputs`.
      required:
        - results
      example:
        results:
          - kind: single_artist
            library_id: 1234
            main:
              discogs_artist_id: 12345
              musicbrainz_artist_id: "abc-def-12345"
              wikidata_qid: "Q12345"
            method: cross_source_agreement
            confidence: 0.95
            provenance:
              - source: discogs
                method: exact_match
                confidence: 0.98
                external_id: "12345"
              - source: musicbrainz
                method: alias_match
                confidence: 0.95
                external_id: "abc-def-12345"
          - kind: compilation
            library_id: 5678
            provenance: []
            tracks:
              - track_position: "A1"
                sources:
                  - source: discogs
                    method: exact_match
                    confidence: 0.90
                    external_id: "release/789"
          - kind: unresolved
            library_id: 9999
            provenance:
              - source: discogs
                method: exact_match
                confidence: null
                external_id: null
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkResolveResult'
        cache_stats:
          $ref: '#/components/schemas/CacheStats'

    # ====================================
    # Release identity (LML#526)
    # ====================================
    # The `POST /api/v1/identity/resolve` endpoint mints (or returns) a
    # stable identity_id for a release-shaped (source, external_id) pair.
    # The wire shape is polymorphic on `kind` for forward compatibility —
    # `kind: artist` will be added in a follow-up — but v1 accepts only
    # `release`. Both first-mint and idempotent re-resolve return 200; the
    # `minted` field distinguishes them. Sentinel inputs (Discogs id <= 0,
    # malformed Bandcamp URL, etc.) are rejected with 422 before any DB
    # write, so no poisoned identity row can be created.

    IdentityKind:
      type: string
      description: >
        Discriminator for the identity being resolved. v1 of the
        `/api/v1/identity/resolve` endpoint accepts only `release`; the
        `artist` value is reserved for the planned symmetric extension.
      enum:
        - release

    ReleaseIdentitySource:
      type: string
      description: >
        Source whose external ID is being resolved into a release identity.
        Matches the v1 source list from LML#526; new sources land in
        lockstep with their column on `entity.release_identity` and a
        matching sentinel rule on the LML side.
      enum:
        - discogs_release
        - discogs_master
        - bandcamp
        - apple_music_album

    ReleaseIdentityResolveRequest:
      type: object
      description: >
        Request body for `POST /api/v1/identity/resolve`. The triple
        `(kind, source, external_id)` is the identity key — the same triple
        always returns the same identity_id.
      required:
        - kind
        - source
        - external_id
      properties:
        kind:
          $ref: '#/components/schemas/IdentityKind'
        source:
          $ref: '#/components/schemas/ReleaseIdentitySource'
        external_id:
          type: string
          description: >
            Source-specific identifier. For `discogs_release` /
            `discogs_master` it is the positive integer ID as a string;
            zero and negative values are rejected with 422 (Discogs uses
            `0` for the unknown-release sentinel). For `bandcamp` it is
            the canonical album URL (e.g.
            `https://autechre.bandcamp.com/album/confield`); LML
            URL-canonicalises before mint so trailing-slash and
            equivalent variants converge on one identity row. Non-album
            Bandcamp URLs (track URLs, bare subdomain) are rejected with
            422. For `apple_music_album` it is the numeric Apple Music
            album ID as a string (e.g. `1234567890`); zero, negative,
            and non-numeric values are rejected with 422.
      example:
        kind: release
        source: discogs_release
        external_id: "12345"

    ReleaseIdentityResolveResponse:
      type: object
      description: >
        Response to `POST /api/v1/identity/resolve`. `identity_id` is
        stable across calls; `minted` distinguishes the first call (true)
        from subsequent lookups (false). Re-resolves do not write a new
        reconciliation log row — the resolver only logs the act of
        minting.
      required:
        - identity_id
        - kind
        - minted
      properties:
        identity_id:
          type: integer
          description: >
            `entity.release_identity.id` for the resolved row. Stable
            across calls with the same `(kind, source, external_id)`.
        kind:
          $ref: '#/components/schemas/IdentityKind'
        minted:
          type: boolean
          description: >
            `true` when this call inserted a new row, `false` when an
            existing row was returned. Useful for callers that want to
            observe whether they were the first to surface a given
            release.
      example:
        identity_id: 42
        kind: release
        minted: true

    # ====================================
    # Artist Search Alias (artist-search-alias plan)
    # ====================================

    ArtistSearchAliasSource:
      type: string
      description: >
        Origin of an artist search alias variant. Opaque to BS storage (just a
        tag); used by future read-path ranking and audit. Open enum — new
        sources can be added by LML without a wire-format break.
      enum:
        - discogs_name_variation
        - discogs_alias
        - discogs_member
        - wxyc_library_alt

    ArtistSearchAliasMethod:
      type: string
      description: >
        Semantic classification of how this variant relates to the subject
        artist. Distinct from source — multiple sources can emit the same
        method.
      enum:
        - name_variation
        - alias
        - member
        - alt_curated

    ArtistSearchAliasVariant:
      type: object
      description: >
        One alias variant for an artist. The `variant` string is what gets
        matched against search queries via trigram similarity. The `source`
        tag identifies where the row came from; `method` classifies the
        semantic relationship.
      required:
        - source
        - variant
        - method
        - confidence
      properties:
        source:
          $ref: '#/components/schemas/ArtistSearchAliasSource'
        variant:
          type: string
          description: The searchable string (e.g. "Thee Oh Sees").
        related_external_id:
          type: string
          nullable: true
          description: >
            For alias / member kinds, the namespaced source-side id of the
            related artist (e.g. "discogs:artist:67890",
            "musicbrainz:artist:<mbid>"). NULL for name_variation and
            alt_curated.
        related_name:
          type: string
          nullable: true
          description: >
            For alias / member kinds, the canonical name of the related
            artist as the source records it. NULL otherwise.
        active:
          type: boolean
          nullable: true
          description: >
            For member kind only — Discogs records active/inactive band
            membership. NULL for other kinds.
        method:
          $ref: '#/components/schemas/ArtistSearchAliasMethod'
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: >
            Per-source default confidence (e.g. 0.95 for
            discogs_name_variation, 0.85 for discogs_alias / wxyc_library_alt,
            0.70 for discogs_member). v1 search ignores this; stored for v2
            ranking calibration.

    ArtistSearchAliasesResult:
      type: object
      required:
        - name
        - variants
        - sources_present
      properties:
        name:
          type: string
          description: The WXYC canonical artist name from the request.
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSearchAliasVariant'
        sources_present:
          type: array
          description: >
            Sources the composer actually queried for this artist. A source
            appears here iff the composer reached its fetch code path —
            independent of whether that path produced any variants. Consumers
            use this to scope reconciliation: only delete cached rows whose
            `source` is listed here. Sources skipped because of missing
            prerequisites (e.g., no `discogs_artist_id` in
            `entity.identity`) are ABSENT from this list, and the consumer
            must leave their cached rows alone — that source did not run, so
            its absence is not evidence of upstream deletion. Modeled on the
            empty-provenance semantic of `BulkResolveProvenanceEntry`.
          items:
            $ref: '#/components/schemas/ArtistSearchAliasSource'

    ArtistSearchAliasesBulkRequest:
      type: object
      required:
        - names
      properties:
        names:
          type: array
          description: WXYC canonical artist names.
          minItems: 1
          maxItems: 1000
          items:
            type: string

    ArtistSearchAliasesBulkResponse:
      type: object
      required:
        - artists
        - missing
      properties:
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSearchAliasesResult'
        missing:
          type: array
          description: >
            Input names with no `entity.identity` row in LML — i.e., LML
            doesn't know any external IDs for these. BS can choose to retry
            later (after a discogs-cache rebuild and entity-resolution
            campaign) or leave them.
          items:
            type: string
        cache_stats:
          $ref: '#/components/schemas/CacheStats'

    # ====================================
    # Cache refresh for identities (LML#525)
    # ====================================
    # `POST /api/v1/cache/refresh-for-identities` is the source-agnostic
    # cache-warmer that Backend's rotation-artist-backfill cron consumes
    # (WXYC/Backend-Service#1381). The cron passes `entity.release_identity.id`
    # values; LML maps each to its per-source `(source, external_id)` pairs
    # and dispatches the per-source release-cache refresh. After each
    # refreshed Discogs release, LML walks the release's artist credits and
    # refreshes the per-artist cache too — applying the LML#525 sentinel
    # guard at the walk site so VA compilations with `artist_id = 0` don't
    # leak through. Today only the Discogs leg is wired; other sources
    # return `release_outcome = "not_implemented"`.

    CacheRefreshSourceOutcome:
      type: string
      description: >
        Per-source release-leg outcome. `success` covers both cache hits and
        fresh fetches AND tombstones (Discogs 404s — the cache state is
        still current). `error` is transport / 5xx / parse failure. The
        leg did not complete. `not_implemented` is for sources whose cache
        layer doesn't exist yet (discogs_master pre-`MasterRelease.artists`,
        musicbrainz_release pre-LML#217, etc.). Consumers that need to
        distinguish "warm-real" from "warm-tombstone" should read the cache
        row's `not_found` flag directly, not infer from this enum.
      enum:
        - success
        - error
        - not_implemented

    CacheRefreshItemStatus:
      type: string
      description: >
        Per-identity rollup of the per-source outcomes. Release-leg-gated:
        any source `success` → `warmed` (artist failures inside a release
        walk are partial value, not a retry trigger). Only `not_implemented`
        sources → `not_implemented`. All sources errored → `error`. Row
        absent in `entity.release_identity` → `not_found` (with `sources`
        as null). Only `error` is a retry signal.
      enum:
        - warmed
        - not_found
        - not_implemented
        - error

    CacheRefreshArtistOutcome:
      type: object
      description: >
        Per-artist outcome inside the walk-to-artists step of a per-source
        release refresh. `external_id` is string-typed for future
        source-agnosticism — Discogs IDs serialize as decimal strings.
      required:
        - external_id
        - outcome
      properties:
        external_id:
          type: string
        outcome:
          $ref: '#/components/schemas/CacheRefreshSourceOutcome'
        message:
          type: string
          nullable: true
          description: >
            Exception class name when `outcome != success`. Bare `str()` of
            the exception is intentionally NOT serialized — it may carry
            upstream error bodies, SQL fragments, or file paths. Full
            traceback lands in Sentry.

    CacheRefreshSourceResult:
      type: object
      description: >
        Per-source outcome for one identity. `artists` is the walk-to-artists
        fan-out result for the Discogs release leg — empty list on
        tombstone-success (no artists to walk) and on legs that don't do a
        walk (every non-Discogs source today).
      required:
        - release_outcome
      properties:
        release_outcome:
          $ref: '#/components/schemas/CacheRefreshSourceOutcome'
        artists:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/CacheRefreshArtistOutcome'
        message:
          type: string
          nullable: true

    CacheRefreshResultItem:
      type: object
      description: >
        Per-identity verdict. `sources` is null when `status == not_found`
        (no row to dispatch against). Otherwise it is keyed by source
        vocabulary (`discogs_release`, `discogs_master`, …); see
        `RELEASE_SOURCE_COLUMN` on the LML side for the canonical set.
      required:
        - identity_id
        - status
      properties:
        identity_id:
          type: integer
        status:
          $ref: '#/components/schemas/CacheRefreshItemStatus'
        sources:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/CacheRefreshSourceResult'
        message:
          type: string
          nullable: true

    BulkCacheRefreshRequest:
      type: object
      description: >
        Request body. The 50-id batch cap is enforced server-side with
        HTTP 400 on overflow (not 422 — LML's `/api/v1/lookup/bulk`
        precedent). Downstream callers should encode 50 as a hard
        constant or assert at startup, not expose it as an env knob —
        the cap is bounded by Discogs rate-limit × cold-cache fan-out ≤
        Railway's request-timeout ceiling, and recalibration must land
        alongside any ingress change. Empty `identity_ids` returns 422
        (Pydantic `min_length=1`). Duplicate identity_ids are allowed;
        each runs independently and shows up as a separate result.
      required:
        - identity_ids
      properties:
        identity_ids:
          type: array
          minItems: 1
          items:
            type: integer
      example:
        identity_ids: [42, 99, 12345, 7]

    BulkCacheRefreshResponse:
      type: object
      description: >
        Per-identity verdicts in input order. No top-level counters —
        callers derive them via `Counter(r.status for r in results)`,
        matching the `BulkLookupResultItem` precedent.
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/CacheRefreshResultItem'
      example:
        results:
          - identity_id: 42
            status: warmed
            sources:
              discogs_release:
                release_outcome: success
                artists:
                  - external_id: "999"
                    outcome: success
                  - external_id: "1001"
                    outcome: success
          - identity_id: 99
            status: not_found
            sources: null
          - identity_id: 12345
            status: not_implemented
            sources:
              discogs_master:
                release_outcome: not_implemented
                artists: []
          - identity_id: 7
            status: error
            sources:
              discogs_release:
                release_outcome: error
                artists: []
                message: ConnectError

    # ====================================
    # LML Discogs & Metadata Service Types
    # ====================================

    DiscogsTrackItem:
      type: object
      description: A track on a release, with optional per-track artist credits (for compilations).
      required:
        - position
        - title
      properties:
        position:
          type: string
        title:
          type: string
        duration:
          type: string
          nullable: true
        artists:
          type: array
          items:
            type: string
          default: []

    DiscogsArtistCredit:
      type: object
      description: An artist credit on a release (performer, producer, etc.).
      required:
        - name
      properties:
        artist_id:
          type: integer
          nullable: true
        name:
          type: string
        join:
          type: string
          default: ""
          description: Join phrase (e.g. " & ", ", ")
        role:
          type: string
          nullable: true
          description: Role for extra artists (e.g. "Producer", "Mixed By")

    DiscogsLabelCredit:
      type: object
      required:
        - name
      properties:
        label_id:
          type: integer
          nullable: true
        name:
          type: string
        catno:
          type: string
          nullable: true
          description: Catalog number

    DiscogsReleaseVideo:
      type: object
      required:
        - src
      properties:
        src:
          type: string
        title:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Duration in seconds
        embed:
          type: boolean
          default: true

    DiscogsReleaseMetadata:
      type: object
      description: Full release metadata from LML, including tracklist and enriched credits.
      required:
        - release_id
        - title
        - artist
        - release_url
      properties:
        release_id:
          type: integer
        master_id:
          type: integer
          nullable: true
          description: >
            Discogs master ID for this release, when the release belongs to a
            master. `null` when Discogs has no master (one-offs,
            self-released). Lets a caller collapse multiple pressings/formats
            of one logical album into a single record keyed on the master.
        title:
          type: string
        artist:
          type: string
        year:
          type: integer
          nullable: true
        label:
          type: string
          nullable: true
        artist_id:
          type: integer
          nullable: true
        label_id:
          type: integer
          nullable: true
        genres:
          type: array
          items:
            type: string
          default: []
        styles:
          type: array
          items:
            type: string
          default: []
        tracklist:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsTrackItem'
          default: []
        artwork_url:
          type: string
          nullable: true
        artwork_checked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent live Discogs API call that resolved
            this release's artwork. `null` means LML's bulk loader populated
            the row but the live API has not been queried yet (the "never
            asked" state); a value means LML hit the live API and either
            populated `artwork_url` or confirmed Discogs has no cover. LML
            uses this to distinguish bulk-loader gaps (which it back-fills)
            from genuinely-imageless releases (which it does not refetch).
            See WXYC/discogs-etl#239 + WXYC/library-metadata-lookup#423.
        not_found:
          type: boolean
          default: false
          description: |
            Tombstone marker for Discogs 404s on `get_release`. `true` means
            LML hit the live Discogs API for this release id and Discogs
            returned 404; subsequent reads short-circuit on this flag rather
            than re-burning the rate-limit budget. The tombstone row carries
            `title = ""` and `artist = ""` as identifier sentinels;
            consumers must guard against rendering those empty strings as
            real values. `release_url` is identifier-derived
            (`https://www.discogs.com/release/{release_id}`) and remains
            valid even on a tombstone. LML's public boundary translates
            `not_found = true` back to `None` for direct callers; this flag
            is observable only by consumers that read the cache row
            directly (none of which exist in LML's public API today, but
            the contract is exposed here for future cross-service readers).
            See WXYC/library-metadata-lookup#510.
        release_url:
          type: string
        cached:
          type: boolean
          default: false
        artists:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsArtistCredit'
          default: []
        extra_artists:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsArtistCredit'
          default: []
        labels:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsLabelCredit'
          default: []
        released:
          type: string
          nullable: true
          description: Release date as ISO string
        videos:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsReleaseVideo'
          default: []

    DiscogsResolvedToken:
      type: object
      description: A single resolved token from Discogs markup parsing. Discriminated by the `type` field.
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - plainText
            - artistLink
            - labelName
            - releaseLink
            - masterLink
            - bold
            - italic
            - underline
            - urlLink
        text:
          type: string
          description: Content for plainText tokens
        name:
          type: string
          description: Name for artistLink and labelName tokens
        display_name:
          type: string
          description: Display name for artistLink tokens (disambiguation suffix stripped)
        title:
          type: string
          description: Title for releaseLink and masterLink tokens
        url:
          type: string
          description: URL for artistLink, releaseLink, masterLink tokens
        href:
          type: string
          nullable: true
          description: URL for urlLink tokens (null if URL is invalid)
        content:
          type: string
          description: Content for bold, italic, underline, and urlLink tokens

    DiscogsArtistDetails:
      type: object
      description: Full artist details from Discogs, including bio, aliases, and group members.
      required:
        - artist_id
        - name
      properties:
        artist_id:
          type: integer
        name:
          type: string
        profile:
          type: string
          nullable: true
        profile_tokens:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/DiscogsResolvedToken'
          description: Pre-parsed structured tokens from the Discogs profile markup
        image_url:
          type: string
          nullable: true
        name_variations:
          type: array
          items:
            type: string
          default: []
        aliases:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: integer
              name:
                type: string
          default: []
        members:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: integer
              name:
                type: string
              active:
                type: boolean
                default: true
          default: []
        urls:
          type: array
          items:
            type: string
          default: []
        cached:
          type: boolean
          default: false

    DiscogsReleaseInfo:
      type: object
      description: A single release from the track-releases search.
      required:
        - album
        - artist
        - release_id
        - release_url
      properties:
        album:
          type: string
        artist:
          type: string
        release_id:
          type: integer
        release_url:
          type: string
        is_compilation:
          type: boolean
          default: false

    DiscogsTrackReleasesResponse:
      type: object
      description: Response from LML's track-releases search endpoint.
      properties:
        track:
          type: string
        artist:
          type: string
          nullable: true
        releases:
          type: array
          items:
            $ref: '#/components/schemas/DiscogsReleaseInfo'
          default: []
        total:
          type: integer
          default: 0
        cached:
          type: boolean
          default: false

    # ============================
    # Library Search Types
    # ============================

    TrackMatchSource:
      type: string
      enum:
        - cta
        - discogs_release
        - discogs_master
        - library_identity
      description: >
        Provenance of a TrackMatchHint. `cta` indicates Backend's local
        `compilation_track_artist` lookup (Track 1, BS-local). `discogs_release` indicates
        LML matched via a Discogs release_id (Track 2; pre-cross-cache-identity, this is a
        direct CEI release-format hit; post-cross-cache-identity, it's a
        `library_identity.discogs_release_id` hit). `discogs_master` indicates LML matched
        via a Discogs master_id (Track 2; the more common pre-cross-cache-identity path,
        since ~90% of CEI rows are master-format). `library_identity` indicates an
        explicit substrate match — emitted post-cross-cache-identity when LML's pipeline
        exposes the distinction in its response.

    TrackMatchHint:
      type: object
      description: >
        Populated on library search / lookup result items when a track-title match drove
        the inclusion of this release into the results. The `source` field distinguishes
        the underlying match pathway so consumers can render appropriate UX (e.g.,
        qualitative "matched via Discogs (verified)" tooltips) and downstream audits can
        break coverage down by source.
      required:
        - title
        - source
      properties:
        title:
          type: string
          description: The track title as stored in the source.
        artist_credit:
          type: string
          nullable: true
          description: >
            Per-track artist credit (for compilations, where each track may credit a
            distinct artist). Null for non-comp tracks where the release-level artist
            applies.
        position:
          type: string
          nullable: true
          description: >
            Track position on the release as stored in the source (e.g., "A1", "B2", "5").
            String-typed to match Discogs's `release_track.position` shape, which uses
            vinyl-side notation for LP releases. Null when position is unknown or
            inapplicable (e.g., CTA-derived matches, since `compilation_track_artist` has
            no position column).
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
          description: >
            Confidence score for the underlying identity match. Sourced from
            `library_identity.confidence` post-cross-cache-identity, from
            `canonical_entity_confidence` pre-cross-cache-identity, or fixed at 1.0 for
            `cta`-source hits (the curated VA-disambiguation data is treated as
            authoritative). Used by the UI to render qualitative tooltips on the chip;
            consumers should not assume null for `cta` source.
        source:
          $ref: '#/components/schemas/TrackMatchSource'

    ArtistMatchHint:
      type: object
      description: >
        Populated on library search result items when an artist-alias match
        from the BS-local `artist_search_alias` cache drove the inclusion of
        this release into the results (artist-search-alias plan PR 5).
        Sibling to TrackMatchHint — track hints carry title + position +
        artist_credit which have no meaning for alias matches; alias hints
        carry the variant string that scored and its source tag for UX
        rendering and audit.
      required:
        - matched_variant
        - source
      properties:
        matched_variant:
          type: string
          description: The cached alias string that trigram-matched the query.
        source:
          $ref: '#/components/schemas/ArtistSearchAliasSource'

    LibrarySearchItem:
      type: object
      description: A single item from LML's library catalog search.
      required:
        - id
      properties:
        id:
          type: integer
        title:
          type: string
          nullable: true
        artist:
          type: string
          nullable: true
        call_letters:
          type: string
          nullable: true
        artist_call_number:
          type: integer
          nullable: true
        release_call_number:
          type: integer
          nullable: true
        genre:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        alternate_artist_name:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        on_streaming:
          type: boolean
          nullable: true
        call_number:
          type: string
          description: Computed call number (e.g. "Rock CD S 1/1")
        library_url:
          type: string
          description: URL to the release on wxyc.info
        matched_via:
          type: array
          items:
            $ref: '#/components/schemas/TrackMatchHint'
          description: >
            Populated when a track-title match drove this release into the results
            (catalog-track-search plan §5.1). Empty or absent when the release matched
            on artist / title normally. Backward-compatible — existing consumers ignore
            the field.
        matched_via_alias:
          type: array
          items:
            $ref: '#/components/schemas/ArtistMatchHint'
          description: >
            Sibling to `matched_via`. Reserved for the day LML composes
            artist-alias hits itself; not produced in v1 of the
            artist-search-alias plan (BS-local cache only). Optional and
            backward-compatible.

    LibrarySearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/LibrarySearchItem'
        total:
          type: integer
        query:
          type: string
          nullable: true

    # ============================
    # Streaming Check Types
    # ============================

    StreamingCheckRequest:
      type: object
      required:
        - artist
        - title
      properties:
        artist:
          type: string
          description: Artist name to search for
        title:
          type: string
          description: Album title to search for

    StreamingSourceMatch:
      type: object
      description: A match found on a single streaming service.
      required:
        - url
        - confidence
      properties:
        url:
          type: string
          description: URL to the matched album on the service
        confidence:
          type: number
          description: Match confidence score (0-100)

    StreamingCheckSources:
      type: object
      description: Per-service streaming match results.
      properties:
        spotify:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StreamingSourceMatch'
        deezer:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StreamingSourceMatch'
        apple_music:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StreamingSourceMatch'
        bandcamp:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StreamingSourceMatch'

    StreamingCheckResponse:
      type: object
      required:
        - on_streaming
        - sources
      properties:
        on_streaming:
          type: boolean
          nullable: true
          description: |
            True if found on any service, false if all services confirmed absent (no errors),
            null if inconclusive — either no services checked OR at least one service raised
            an error (see `errored_sources`). Treat null as "do not persist" / "retry later".
        sources:
          $ref: '#/components/schemas/StreamingCheckSources'
        errored_sources:
          type: array
          items:
            type: string
          description: |
            Names of services whose check raised an exception (transient network/rate-limit/
            scraping failure). Empty when every dispatched check completed without raising.
            When non-empty, callers should consider the listed services unchecked and may
            schedule a selective retry. Independent of `on_streaming`: a service can both
            match (populating `sources.<service>`) and other services can error.

    # ===================
    # Proxy / Config Types
    # ===================

    AppConfig:
      type: object
      required:
        - posthogApiKey
        - posthogHost
        - requestOMaticUrl
        - apiBaseUrl
      properties:
        posthogApiKey:
          type: string
          description: PostHog analytics write key (public by design)
        posthogHost:
          type: string
          description: PostHog ingestion host
        requestOMaticUrl:
          type: string
          description: Request-o-matic service URL for song requests
        apiBaseUrl:
          type: string
          description: Backend API base URL

    TrackListItem:
      type: object
      required:
        - position
        - title
      properties:
        position:
          type: string
          description: Track position (e.g. "1", "A1")
        title:
          type: string
          description: Track title
        duration:
          type: string
          description: Track duration (e.g. "5:23")

    AlbumMetadataResponse:
      type: object
      properties:
        discogsReleaseId:
          type: integer
          description: Discogs release ID
        discogsUrl:
          type: string
          description: Discogs release page URL
        releaseYear:
          type: integer
          description: Release year from Discogs
        artworkUrl:
          type: string
          description: Album artwork image URL
        genres:
          type: array
          items:
            type: string
          description: Discogs genre classifications
        styles:
          type: array
          items:
            type: string
          description: Discogs style classifications (more specific than genres)
        label:
          type: string
          description: Primary record label name
        discogsArtistId:
          type: integer
          description: Discogs artist ID, for linking to artist metadata
        fullReleaseDate:
          type: string
          description: Full release date when available (e.g. "2024-03-15")
        tracklist:
          type: array
          items:
            $ref: '#/components/schemas/TrackListItem'
          description: Release tracklist
        spotifyUrl:
          type: string
          description: Spotify URL for the album or track
        appleMusicUrl:
          type: string
          description: Apple Music URL for the album or track
        youtubeMusicUrl:
          type: string
          description: YouTube Music search URL
        bandcampUrl:
          type: string
          description: Bandcamp search URL
        soundcloudUrl:
          type: string
          description: SoundCloud search URL

    ArtistMetadataResponse:
      type: object
      properties:
        discogsArtistId:
          type: integer
          description: Discogs artist ID
        bio:
          type: string
          description: Artist biography from Discogs
        wikipediaUrl:
          type: string
          description: Wikipedia URL for the artist
        imageUrl:
          type: string
          description: Artist image URL from Discogs

    ArtworkSearchResponse:
      type: object
      properties:
        artworkUrl:
          type: string
          nullable: true
          description: Best-match artwork image URL
        source:
          type: string
          nullable: true
          description: Provider that supplied the artwork (e.g. "discogs")
        confidence:
          type: number
          format: double
          description: Confidence score of the match (0-1)

    EntityResolveResponse:
      type: object
      required:
        - name
        - type
        - id
      properties:
        name:
          type: string
          description: Entity name
        type:
          type: string
          enum:
            - artist
            - release
            - master
          description: Discogs entity type
        id:
          type: integer
          description: Discogs entity ID

    SpotifyTrackResponse:
      type: object
      required:
        - title
        - artist
        - album
      properties:
        title:
          type: string
          description: Track title
        artist:
          type: string
          description: Primary artist name
        album:
          type: string
          description: Album name
        artworkUrl:
          type: string
          nullable: true
          description: Album artwork URL from Spotify

    LiveFsUpdateEvent:
      description: >
        SSE event emitted on the `live-fs-topic` when an enrichment-worker (BS#892)
        finalizes the metadata for a flowsheet row. Payload carries the full
        flowsheet row so a newly-mounted client (e.g. a /live viewer that just
        opened the page) can surface the post-enrichment fields (`artwork_url`,
        `release_year`, ...) without a follow-up GET. Provider:
        Backend-Service/apps/backend/services/metadata-broadcast/metadata-broadcast.ts
        (`filterMetadataUpdate`). Consumer: dj-site `live-updates-listener.ts`.
        Contract: `CONTRACTS.LIVE_FS_UPDATE_INCLUDES_FULL_ROW`.
      type: object
      required:
        - type
        - payload
        - timestamp
      properties:
        type:
          type: string
          enum: [update]
        payload:
          $ref: '#/components/schemas/FlowsheetEntryResponse'
        timestamp:
          type: string
          format: date-time

    LiveFsRefetchEvent:
      description: >
        SSE event emitted on the `live-fs-topic` when bulk state changes (ETL
        runs, schema migrations) make targeted patches impractical. Consumers
        respond with a coarse cache invalidation. `payload.source` is a free-text
        label for telemetry only (`etl`, `migration`, etc.) — clients must not
        branch on it.
      type: object
      required:
        - type
        - payload
        - timestamp
      properties:
        type:
          type: string
          enum: [refetch]
        payload:
          type: object
          required:
            - source
          properties:
            source:
              type: string
              description: Free-text label naming the upstream cause (telemetry only).
        timestamp:
          type: string
          format: date-time

    LiveFsEvent:
      description: >
        Discriminated union of events emitted on the `live-fs-topic`. Every
        event has the same `{ type, payload, timestamp }` envelope — pinned by
        `CONTRACTS.LIVE_FS_EVENT_ENVELOPE_SHAPE`.
      oneOf:
        - $ref: '#/components/schemas/LiveFsUpdateEvent'
        - $ref: '#/components/schemas/LiveFsRefetchEvent'
      discriminator:
        propertyName: type
        mapping:
          update: '#/components/schemas/LiveFsUpdateEvent'
          refetch: '#/components/schemas/LiveFsRefetchEvent'

security:
  - BearerAuth: []

paths:
  /flowsheet:
    get:
      summary: Get flowsheet entries
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Number of entries to return
        - name: shows_limit
          in: query
          schema:
            type: integer
          description: Number of shows to return entries from
        - name: page
          in: query
          schema:
            type: integer
          description: Page number for pagination
        - name: start_id
          in: query
          schema:
            type: integer
          description: First play_order id in range (must be provided with end_id)
        - name: end_id
          in: query
          schema:
            type: integer
          description: Last play_order id in range (must be provided with start_id)
      responses:
        '200':
          description: List of flowsheet entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlowsheetEntryResponse'

    post:
      summary: Add entry to flowsheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FlowsheetCreateSongFromCatalog'
                - $ref: '#/components/schemas/FlowsheetCreateSongFreeform'
                - $ref: '#/components/schemas/FlowsheetCreateMessage'
      responses:
        '200':
          description: Successfully added entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryResponse'

    patch:
      summary: Update flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlowsheetUpdateRequest'
      responses:
        '200':
          description: Successfully updated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryResponse'

    delete:
      summary: Delete flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entry_id
              properties:
                entry_id:
                  type: integer
      responses:
        '200':
          description: Successfully deleted entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryResponse'

  /flowsheet/latest:
    get:
      summary: Get the most recent flowsheet entry
      security: []
      responses:
        '200':
          description: Latest flowsheet entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryResponse'

  /flowsheet/join:
    post:
      summary: Start or join a show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dj_id
              properties:
                dj_id:
                  type: integer
                show_name:
                  type: string
                  description: Required only when starting a new show
                specialty_id:
                  type: integer
                  description: ID of specialty show entry
                dj_name_override:
                  type: string
                  maxLength: 255
                  description: >
                    Optional per-show override for the public DJ name. When
                    present and non-empty after trim, supersedes the caller's
                    `auth_user.dj_name`-derived name on the `show_start` marker
                    text, on the `flowsheet.dj_name` column of every entry in
                    this show, and on `shows.legacy_dj_name`. Empty or
                    whitespace-only values are treated as absent. Scoped to the
                    new-show (start-show) path; the co-host /join branch
                    intentionally ignores this field. Max length matches
                    `auth_user.dj_name varchar(255)`.
      responses:
        '200':
          description: Successfully joined/started show
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Show'
                  - $ref: '#/components/schemas/ShowDJ'

  /flowsheet/end:
    post:
      summary: End or leave a show
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dj_id:
                  type: integer
      responses:
        '200':
          description: Successfully ended/left show
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Show'
                  - $ref: '#/components/schemas/ShowDJ'

  /flowsheet/djs-on-air:
    get:
      summary: Get list of DJs currently on air
      security: []
      responses:
        '200':
          description: List of active DJs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OnAirDJ'

  /flowsheet/on-air:
    get:
      summary: Get on-air status for DJ
      parameters:
        - name: dj_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Current show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_live:
                    type: boolean

  /flowsheet/play-order:
    patch:
      summary: Update the play order of a flowsheet entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entry_id
                - new_position
              properties:
                entry_id:
                  type: integer
                new_position:
                  type: integer
      responses:
        '200':
          description: Successfully updated play order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowsheetEntryResponse'

  /flowsheet/playlist:
    get:
      summary: Get complete playlist for a show
      parameters:
        - name: show_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Complete flowsheet for show
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowPlaylist'

  /flowsheet/search:
    get:
      summary: Search historical playlists
      description: Search flowsheet entries by artist, song, album, label, or DJ name
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (supports AND, OR, NOT, exact phrases, wildcards)
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
