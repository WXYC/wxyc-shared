openapi: 3.0.3
info:
  title: WXYC Backend API
  description: |
    API for managing WXYC radio station operations including flowsheets, library, DJs, and schedule.

    This is the single source of truth for all WXYC API types. Code is generated from this spec
    for TypeScript, Swift, and Kotlin consumers.
  version: 1.14.0
  contact:
    name: WXYC
    url: https://wxyc.org

servers:
  - url: http://localhost:{port}
    description: Local development server
    variables:
      port:
        default: '8080'
        description: Local API server port
  - url: https://api.wxyc.org
    description: Production server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT token from Better Auth
    LMLBearerAuth:
      type: http
      scheme: bearer
      description: >
        Static bearer token for the library-metadata-lookup (LML) service.
        Configured via the `LML_API_KEY` env var on each consumer (Backend,
        request-o-matic, tubafrenzy). Distinct from `BearerAuth` (Better Auth
        JWTs); LML routes verify only this static key.

  schemas:
    # ===================
    # Common Types
    # ===================

    ApiErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true

    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100

    PaginationInfo:
      type: object
      required:
        - page
        - limit
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean

    DateTimeEntry:
      type: object
      required:
        - day
        - time
      properties:
        day:
          type: string
          description: Day string (e.g., "Monday")
        time:
          type: string
          description: Time string (e.g., "14:00")

    HealthCheckResponse:
      type: object
      description: |
        Liveness response shape for `GET /health` (and equivalent) endpoints.
        Cross-language contract owned by `wxyc-fastapi` (Python) and adopted
        by Backend-Service (Node) via generated TS types.

        `additionalProperties: true` lets services attach extra fields without
        breaking consumers; semantic-index, for example, returns `artist_count`
        alongside `status`.
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
          description: |
            Service-reported health. `healthy` = fully operational; `degraded`
            = serving but with reduced capability; `unhealthy` = should not
            receive traffic.
      additionalProperties: true

    ReadinessResponse:
      description: |
        Readiness response shape for `GET /ready` (and equivalent) endpoints.
        Extends `HealthCheckResponse` with a per-dependency status map.
        Each entry in `services` reports the live state of one external
        dependency (database, upstream HTTP service, queue, etc.).

        Status values:
          - `ok`          — dependency reachable and responsive
          - `unavailable` — dependency reachable but reporting an error,
                            or the connection itself failed
          - `timeout`     — dependency exceeded the readiness probe deadline
      allOf:
        - $ref: '#/components/schemas/HealthCheckResponse'
        - type: object
          required:
            - services
          properties:
            services:
              type: object
              description: Per-dependency readiness map keyed by dependency name.
              additionalProperties:
                type: string
                enum:
                  - ok
                  - unavailable
                  - timeout

    Genre:
      type: string
      enum:
        - Blues
        - Rock
        - Electronic
        - Hiphop
        - Jazz
        - Classical
        - Reggae
        - Soundtracks
        - OCS
        - Unknown

    Format:
      type: string
      enum:
        - Vinyl
        - CD
        - Unknown

    RotationBin:
      type: string
      enum:
        - H
        - M
        - L
        - S
      description: "Rotation bin levels: H=Heavy, M=Medium, L=Light, S=Single"

    DayOfWeek:
      type: string
      enum:
        - Sunday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday

    # ===================
    # Flowsheet Types
    # ===================

    FlowsheetEntryBase:
      type: object
      required:
        - id
        - play_order
        - show_id
      properties:
        id:
          type: integer
        play_order:
          type: integer
        show_id:
          type: integer

    FlowsheetEntryResponse:
      description: Flowsheet entry as returned by the API with all possible fields
      allOf:
        - $ref: '#/components/schemas/FlowsheetEntryBase'
        - type: object
          required:
            - request_flag
          properties:
            # Song entry fields
            album_id:
              type: integer
            track_title:
              type: string
            album_title:
              type: string
            artist_name:
              type: string
            record_label:
              type: string
            label_id:
              type: integer
            rotation_id:
              type: integer
            rotation_bin:
              $ref: '#/components/schemas/RotationBin'
            request_flag:
              type: boolean
            segue:
              type: boolean
            # Message/breakpoint fields
            message:
              type: string
            # Metadata fields (from cache)
            artwork_url:
              type: string
              nullable: true
            discogs_url:
              type: string
              nullable: true
            release_year:
              type: integer
              nullable: true
            spotify_url:
              type: string
              nullable: true
            apple_music_url:
              type: string
              nullable: true
            youtube_music_url:
              type: string
              nullable: true
            bandcamp_url:
              type: string
              nullable: true
            soundcloud_url:
              type: string
              nullable: true
            artist_bio:
              type: string
              nullable: true
            artist_wikipedia_url:
              type: string
              nullable: true
            track_position:
              type: string
              nullable: true
              description: >
                Track position on the release (e.g., "A1", "B2", "5"). Populated when the
                flowsheet entry was created via the dj-site picker after release selection
                (catalog-track-search plan §5.3 / Track 3). String-typed to match Discogs's
                `release_track.position`. Null for free-text entries and legacy rows.
            metadata_status:
              $ref: '#/components/schemas/MetadataStatus'

    FlowsheetSongEntry:
      description: Song entry in the flowsheet
      allOf:
        - $ref: '#/components/schemas/FlowsheetEntryBase'
        - type: object
          required:
            - track_title
            - artist_name
            - album_title
            - record_label
            - request_flag
          properties:
            track_title:
              type: string
            artist_name:
              type: string
            album_title:
              type: string
            record_label:
              type: string
            label_id:
              type: integer
            request_flag:
              type: boolean
            segue:
              type: boolean
            album_id:
              type: integer
            rotation_id:
              type: integer
            rotation_bin:
              $ref: '#/components/schemas/RotationBin'
            track_position:
              type: string
              nullable: true
              description: >
                Track position on the release (e.g., "A1", "B2", "5"). Optional;
                populated by the dj-site picker when a release with a resolvable
                tracklist is chosen (catalog-track-search plan §5.3 / Track 3).
                Free-text `track_title` remains the source of truth; this field is
                additive metadata for future enrichment + analytics.

    FlowsheetShowBlockEntry:
      description: Show block entry (start or end of a DJ's show)
      allOf:
        - $ref: '#/components/schemas/FlowsheetEntryBase'
        - $ref: '#/components/schemas/DateTimeEntry'
        - type: object
          required:
            - dj_name
            - isStart
          properties:
            dj_name:
              type: string
            isStart:
              type: boolean

    FlowsheetMessageEntry:
      description: Message entry (talkset, etc.)
      allOf:
        - $ref: '#/components/schemas/FlowsheetEntryBase'
        - type: object
          required:
            - message
          properties:
            message:
              type: string

    FlowsheetBreakpointEntry:
      description: Breakpoint entry (marks time boundaries)
      allOf:
        - $ref: '#/components/schemas/FlowsheetMessageEntry'
        - $ref: '#/components/schemas/DateTimeEntry'

    FlowsheetCreateSongFromCatalog:
      type: object
      required:
        - album_id
        - track_title
        - request_flag
      properties:
        album_id:
          type: integer
        track_title:
          type: string
        track_position:
          type: string
          description: >
            Track position on the release (e.g., "A1", "B2", "5", "1-12"). Written
            by the dj-site flowsheet picker (catalog-track-search plan §5.3 / Track 3)
            when the DJ selects a track from the resolved release. Omitted when
            the DJ enters a free-text track_title without a tracklist lookup or
            when the release has no resolvable identity. String-typed to match
            Discogs's `release_track.position` (vinyl side notation, multi-disc
            prefixes).
        rotation_id:
          type: integer
        request_flag:
          type: boolean
        segue:
          type: boolean
        record_label:
          type: string

    FlowsheetCreateSongFreeform:
      type: object
      required:
        - artist_name
        - album_title
        - track_title
        - request_flag
      properties:
        artist_name:
          type: string
        album_title:
          type: string
        track_title:
          type: string
        request_flag:
          type: boolean
        segue:
          type: boolean
        record_label:
          type: string
        label_id:
          type: integer
        rotation_id:
          type: integer
          description: >
            Rotation linkage for a track on a rotation album that isn't in the
            WXYC library catalog (BS#1308). The Backend snapshot/else branch
            persists `rotation_id` alongside `album_id IS NULL` so the V2 read
            path can JOIN back to `rotation` for `rotation_bin` and the iOS
            rotation-artwork resolver can find the entry. `rotation_bin` is
            derived on read and intentionally not declared here.

    FlowsheetCreateMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        entry_type:
          type: string
          enum: [talkset, breakpoint, message]
          description: Explicit entry type. If omitted, the backend infers from message content.

    FlowsheetUpdateRequest:
      type: object
      properties:
        track_title:
          type: string
        track_position:
          type: string
          description: >
            Track position on the release (e.g., "A1", "B2", "5", "1-12"). Set
            when re-picking a track via the flowsheet picker; cleared (omitted)
            when a DJ edits the entry to a free-text track_title. String-typed
            to match Discogs's `release_track.position`.
        artist_name:
          type: string
        album_title:
          type: string
        record_label:
          type: string
        label_id:
          type: integer
        request_flag:
          type: boolean
        segue:
          type: boolean

    FlowsheetQueryParams:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        start_id:
          type: integer
        end_id:
          type: integer
        shows_limit:
          type: integer

    PlaylistSearchParams:
      type: object
      properties:
        q:
          type: string
          description: Search query (supports AND, OR, NOT, "", *)
        page:
          type: integer
          minimum: 0
          default: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        sort:
          type: string
          enum:
            - date
            - artist
            - song
            - dj
          default: date
        order:
          type: string
          enum:
            - asc
            - desc
          default: desc

    PlaylistSearchResult:
      type: object
      required:
        - id
        - play_date
        - artist_name
        - track_title
        - album_title
        - record_label
        - dj_name
        - show_id
      properties:
        id:
          type: integer
        play_date:
          type: string
          format: date-time
        artist_name:
          type: string
        track_title:
          type: string
        album_title:
          type: string
        record_label:
          type: string
        dj_name:
          type: string
        show_id:
          type: integer

    PlaylistSearchResponse:
      type: object
      required:
        - results
        - total
        - page
        - totalPages
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistSearchResult'
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    LibraryQueryResponse:
      type: object
      required:
        - results
        - total
        - page
        - totalPages
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AlbumSearchResult'
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    # ===================
    # Flowsheet V2 Types (Discriminated Union)
    # ===================

    FlowsheetEntryType:
      type: string
      enum:
        - track
        - show_start
        - show_end
        - dj_join
        - dj_leave
        - talkset
        - breakpoint
        - message
      description: Discriminator for V2 flowsheet entry types

    FlowsheetV2Base:
      type: object
      description: Base fields shared by all V2 flowsheet entries
      required:
        - id
        - show_id
        - play_order
        - add_time
        - entry_type
      properties:
        id:
          type: integer
        show_id:
          type: integer
          nullable: true
        play_order:
          type: integer
        add_time:
          type: string
          format: date-time

    FlowsheetV2TrackEntry:
      description: V2 track entry - a song that was played
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - request_flag
          properties:
            entry_type:
              type: string
              enum: [track]
            album_id:
              type: integer
              nullable: true
            rotation_id:
              type: integer
              nullable: true
            artist_name:
              type: string
              nullable: true
            album_title:
              type: string
              nullable: true
            track_title:
              type: string
              nullable: true
            track_position:
              type: string
              nullable: true
              description: >
                Track position on the release (e.g., "A1", "B2", "5", "1-12"). Set
                by the dj-site flowsheet picker (catalog-track-search plan §5.3 /
                Track 3) when the DJ selected a track from the resolved release;
                null when the track_title was entered free-form or the release had
                no resolvable identity. String-typed to match Discogs's
                `release_track.position`.
            record_label:
              type: string
              nullable: true
            request_flag:
              type: boolean
            segue:
              type: boolean
            rotation_bin:
              $ref: '#/components/schemas/RotationBin'
            artwork_url:
              type: string
              nullable: true
            discogs_url:
              type: string
              nullable: true
            release_year:
              type: integer
              nullable: true
            spotify_url:
              type: string
              nullable: true
            apple_music_url:
              type: string
              nullable: true
            youtube_music_url:
              type: string
              nullable: true
            bandcamp_url:
              type: string
              nullable: true
            soundcloud_url:
              type: string
              nullable: true
            artist_bio:
              type: string
              nullable: true
            artist_wikipedia_url:
              type: string
              nullable: true
            on_streaming:
              type: boolean
              nullable: true
              description: Whether this album is available on streaming platforms. False means WXYC library exclusive. Null if unknown.
            metadata_status:
              $ref: '#/components/schemas/MetadataStatus'
            genres:
              type: array
              nullable: true
              items:
                type: string
              description: Discogs genre tags surfaced on the Playcut Detail card.
            styles:
              type: array
              nullable: true
              items:
                type: string
              description: Discogs style tags (finer-grained than genres).

    FlowsheetV2ShowStartEntry:
      description: V2 show start event - when a show begins
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - dj_name
            - timestamp
          properties:
            entry_type:
              type: string
              enum: [show_start]
            dj_name:
              type: string
            timestamp:
              type: string
              format: date-time

    FlowsheetV2ShowEndEntry:
      description: V2 show end event - when a show ends
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - dj_name
            - timestamp
          properties:
            entry_type:
              type: string
              enum: [show_end]
            dj_name:
              type: string
            timestamp:
              type: string
              format: date-time

    FlowsheetV2DJJoinEntry:
      description: V2 DJ join event - when a DJ joins an active show
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - dj_name
          properties:
            entry_type:
              type: string
              enum: [dj_join]
            dj_name:
              type: string

    FlowsheetV2DJLeaveEntry:
      description: V2 DJ leave event - when a DJ leaves an active show
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - dj_name
          properties:
            entry_type:
              type: string
              enum: [dj_leave]
            dj_name:
              type: string

    FlowsheetV2TalksetEntry:
      description: V2 talkset entry - DJ talk segment
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - message
          properties:
            entry_type:
              type: string
              enum: [talkset]
            message:
              type: string

    FlowsheetV2BreakpointEntry:
      description: V2 breakpoint entry - hour marker
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
          properties:
            entry_type:
              type: string
              enum: [breakpoint]
            radio_hour:
              type: string
              format: date-time
              nullable: true
              description: >-
                Exact top-of-hour this breakpoint marks (ISO 8601), sourced from
                tubafrenzy's RADIO_HOUR. Distinct from `add_time`, which is the
                row's logging instant (~1 min before the hour). Optional and
                nullable: absent on servers predating the producer rollout, null
                for breakpoint rows not yet backfilled. Clients use `radio_hour`
                for the hour-marker label when present and fall back to `add_time`
                otherwise.
            message:
              type: string
              nullable: true

    FlowsheetV2MessageEntry:
      description: V2 message entry - custom/arbitrary message
      allOf:
        - $ref: '#/components/schemas/FlowsheetV2Base'
        - type: object
          required:
            - entry_type
            - message
          properties:
            entry_type:
              type: string
              enum: [message]
            message:
              type: string

    FlowsheetV2PaginatedResponse:
      type: object
      required:
        - entries
        - page
        - limit
        - total
        - totalPages
      properties:
        entries:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/FlowsheetV2TrackEntry'
              - $ref: '#/components/schemas/FlowsheetV2ShowStartEntry'
              - $ref: '#/components/schemas/FlowsheetV2ShowEndEntry'
              - $ref: '#/components/schemas/FlowsheetV2DJJoinEntry'
              - $ref: '#/components/schemas/FlowsheetV2DJLeaveEntry'
              - $ref: '#/components/schemas/FlowsheetV2TalksetEntry'
              - $ref: '#/components/schemas/FlowsheetV2BreakpointEntry'
              - $ref: '#/components/schemas/FlowsheetV2MessageEntry'
            discriminator:
              propertyName: entry_type
              mapping:
                track: '#/components/schemas/FlowsheetV2TrackEntry'
                show_start: '#/components/schemas/FlowsheetV2ShowStartEntry'
                show_end: '#/components/schemas/FlowsheetV2ShowEndEntry'
                dj_join: '#/components/schemas/FlowsheetV2DJJoinEntry'
                dj_leave: '#/components/schemas/FlowsheetV2DJLeaveEntry'
                talkset: '#/components/schemas/FlowsheetV2TalksetEntry'
                breakpoint: '#/components/schemas/FlowsheetV2BreakpointEntry'
                message: '#/components/schemas/FlowsheetV2MessageEntry'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
          description: Total number of entries
        totalPages:
          type: integer
          description: Total number of pages

    OnAirDJ:
      type: object
      required:
        - id
        - dj_name
      properties:
        id:
          type: integer
        dj_name:
          type: string

    OnAirStatusResponse:
      type: object
      required:
        - djs
        - onAir
      properties:
        djs:
          type: array
          items:
            $ref: '#/components/schemas/OnAirDJ'
        onAir:
          type: string
          description: Status indicator - "on" or "off"

    Show:
      type: object
      properties:
        id:
          type: integer
        primary_dj_id:
          type: integer
        specialty_id:
          type: integer
        show_name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true

    ShowDJ:
      type: object
      properties:
        show_id:
          type: integer
        dj_id:
          type: integer
        active:
          type: boolean

    ShowPlaylist:
      type: object
      properties:
        show_name:
          type: string
        specialty_show:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        show_djs:
          type: array
          items:
            $ref: '#/components/schemas/OnAirDJ'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FlowsheetEntryResponse'

    ShowPeek:
      type: object
      properties:
        show:
          type: integer
        show_name:
          type: string
        date:
          type: string
          format: date-time
        djs:
          type: array
          items:
            type: object
            properties:
              dj_id:
                type: integer
              dj_name:
                type: string
                nullable: true
        specialty_show:
          type: string
        preview:
          type: array
          items:
            $ref: '#/components/schemas/FlowsheetEntryResponse'

    # ===================
    # Catalog Types
    # ===================

    Artist:
      type: object
      required:
        - id
        - artist_name
        - code_letters
        - code_artist_number
        - genre_id
      properties:
        id:
          type: integer
        artist_name:
          type: string
        code_letters:
          type: string
        code_artist_number:
          type: integer
        genre_id:
          type: integer

    ArtistWithGenre:
      allOf:
        - $ref: '#/components/schemas/Artist'
        - type: object
          required:
            - genre_name
          properties:
            genre_name:
              $ref: '#/components/schemas/Genre'

    Album:
      type: object
      required:
        - id
        - artist_id
        - album_title
        - code_number
        - genre_id
        - format_id
      properties:
        id:
          type: integer
        artist_id:
          type: integer
        album_title:
          type: string
        code_number:
          type: integer
        genre_id:
          type: integer
        format_id:
          type: integer
        label:
          type: string
        label_id:
          type: integer
        add_date:
          type: string
          format: date-time
        disc_quantity:
          type: integer
        alternate_artist_name:
          type: string
        album_artist:
          type: string
          description: Credited album artist for compilations (e.g., "Kruder & Dorfmeister" on a DJ-Kicks release filed under Various Artists).

    AlbumSearchResult:
      type: object
      required:
        - id
        - add_date
        - album_title
        - artist_name
        - code_letters
        - code_number
        - code_artist_number
        - format_name
        - genre_name
        - label
      properties:
        id:
          type: integer
        add_date:
          type: string
          format: date-time
        album_title:
          type: string
        artist_name:
          type: string
        code_letters:
          type: string
        code_number:
          type: integer
        code_artist_number:
          type: integer
        format_name:
          type: string
        genre_name:
          type: string
        label:
          type: string
        label_id:
          type: integer
        # Optional fields from fuzzy search
        album_dist:
          type: number
        artist_dist:
          type: number
        # Optional rotation info
        rotation_bin:
          $ref: '#/components/schemas/RotationBin'
        rotation_id:
          type: integer
        plays:
          type: integer
        on_streaming:
          type: boolean
          description: True if this release is available on at least one streaming service. False means only available in the WXYC physical library. Null if unknown.
        album_artist:
          type: string
          description: Credited album artist for compilations.
        date_lost:
          type: string
          format: date-time
          description: When the release was marked missing from the physical library. Null if in library.
        date_found:
          type: string
          format: date-time
          description: When a previously missing release was found. Null if never lost.
        artwork_url:
          type: string
          nullable: true
          description: Album cover artwork URL from Discogs. Null if artwork has not been fetched yet or is unavailable.
        matched_via:
          type: array
          items:
            $ref: '#/components/schemas/TrackMatchHint'
          description: >
            Populated by Backend's catalog `/library/` search when a track-title match
            (CTA or LML proxy fallback) drove this release into the results, per
            catalog-track-search plan §5.1. Empty or absent on normal artist/album hits.
            Backward-compatible — existing consumers ignore the field.
        matched_via_alias:
          type: array
          items:
            $ref: '#/components/schemas/ArtistMatchHint'
          description: >
            Populated by Backend's catalog search when an artist-alias match
            (from `artist_search_alias`) drove this release into the results,
            per artist-search-alias plan PR 5. Sibling field to `matched_via`
            (which is track-title provenance). Empty or absent on normal
            artist/album hits. Backward-compatible — existing consumers
            ignore the field.

    CatalogExportRow:
      type: object
      description: >
        One row of the WXYC library catalog as served by GET /library/catalog
        for offline cloning (BS#1468, Epic F #1466). A query-independent snapshot
        of the core catalog row. Deliberately NOT AlbumSearchResult: it drops the
        search-only decoration (matched_via, matched_via_alias, album_dist,
        artist_dist) and the fields the export omits (add_date, label_id,
        rotation_id, album_artist, date_lost, date_found), and instead ships
        rotation RAW (rotation_bin + rotation_kill_date) so the client evaluates
        rotation expiry against its own clock. See the rotation_bin description
        for the load-bearing semantic difference from AlbumSearchResult.
      required:
        - id
        - artist_name
        - album_title
        - code_letters
        - code_number
        - code_artist_number
        - genre_name
        - format_name
      properties:
        id:
          type: integer
        artist_name:
          type: string
          description: >
            Authoritative artist name. The server COALESCEs the denormalized
            library.artist_name to artists.artist_name (NOT NULL), so this never
            ships as null even before the denormalization backfill completes.
        album_title:
          type: string
        code_letters:
          type: string
          description: Shelf call-number letters (e.g. "AU").
        code_number:
          type: integer
          description: Shelf call-number release number.
        code_artist_number:
          type: integer
          description: Shelf call-number artist number (genre-scoped).
        label:
          type: string
          nullable: true
        genre_name:
          type: string
        format_name:
          type: string
        on_streaming:
          type: boolean
          nullable: true
          description: True if on >=1 streaming service; false if physical-only; null if unknown.
        plays:
          type: integer
          nullable: true
          description: >
            Per-pressing LINKED play count for THIS catalog row (from album_plays).
            The honest per-release number; to rank by real popularity across all
            pressings of a logical album, use `popularity` instead.
        popularity:
          type: integer
          nullable: true
          description: >
            Attribution-corrected popularity (BS#1486 Phase-2 Track 3): a play
            count for this row's LOGICAL album rather than this single pressing.
            Pressings that resolve to the same Discogs master (~90% of RESOLVED
            library rows) collapse into one count; release-only and unresolved
            rows keep a per-release or per-library key, with no cross-pressing
            collapse. It also adds the free-text/unlinked plays Track 1 has
            resolved to the same release/master (the ~43% free-text tail is the
            ceiling, not all of it — only the resolved subset counts), which the
            linked-only `plays` cannot see. Rank releases by `popularity`. null
            when the album_popularity signal has no row for this row's logical
            key. Distinct from `plays`, which stays the per-pressing linked count.
        artwork_url:
          type: string
          nullable: true
          description: Album cover URL from Discogs; null if not yet fetched.
        rotation_bin:
          type: string
          nullable: true
          description: >
            RAW current-rotation bin — the most-recently-ADDED rotation record
            for this album — NOT the CURRENT_DATE-filtered value AlbumSearchResult
            returns. Nominal values are H/M/L/S (see RotationBin) but it is typed
            as a free string, NOT the RotationBin enum, so a value outside those
            cohorts (e.g. 'N', a current server-enum member — NOT legacy) cannot
            break a strict-enum decoder. Evaluate live rotation
            client-side together with rotation_kill_date:
              in rotation  ==  rotation_bin != null
                              AND (rotation_kill_date == null
                                   OR rotation_kill_date > today-in-client-tz)
            The daily kill-date expiry is a clock event no DB trigger can observe,
            which is why this endpoint ships raw and defers expiry to the client.
        rotation_kill_date:
          type: string
          format: date
          nullable: true
          description: >
            Date (YYYY-MM-DD; server ::text cast) the current rotation record
            expires, or null if it has none. Used with rotation_bin to evaluate
            live rotation client-side. Absent from AlbumSearchResult — a client
            that reuses AlbumSearchResult for this endpoint silently loses it.

